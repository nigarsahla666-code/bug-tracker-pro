<!DOCTYPE html>
<html>
<head>
    <title>Bug Tracker Pro</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        .Pending { background-color: #ffebee; }
        .InProgress { background-color: #fff9c4; }
        .Fixed { background-color: #e8f5e9; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bug Tracking System</h1>

        <h2>Add New Bug</h2>
        <form method="POST" action="/submit">
            <input type="text" name="title" placeholder="Bug Title" required>
            <br>
            <textarea name="description" placeholder="Bug Description" required rows="3"></textarea>
            <br>
            <button type="submit">Add Bug</button>
        </form>

        <h2>All Bugs List</h2>
        <table>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
            </tr>
            {% for bug in bugs %}  
            <tr class="{{ bug.status }}">
            <td>{{ bug.id }}</td>
            <td>{{ bug.title }}</td>
            <td>{{ bug.description }}</td>
            <td>
              <b>{{ bug.status }}</b><br>
              <a href="/status/{{ bug.id }}/InProgress">Start</a> |
              <a href="/status/{{ bug.id }}/Fixed">Fix</a> | 
              <a href="/edit/{{ bug.id }}">Edit</a> | 
              <a href="/delete/{{ bug.id }}" style="color:red;">Delete</a>
            </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
