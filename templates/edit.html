<!DOCTYPE html>
<html>
<head>
    <title>Edit Bug</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0 15px 0; box-sizing: border-box; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        label { font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Edit Bug ID: {{ bug.id }}</h1>
        <form method="POST" action="/edit/{{ bug.id }}">
    <input name="title" value="{{ bug.title }}">
    <textarea name="description">{{ bug.description }}</textarea>
    <button type="submit">Update Bug</button>
</form>
        <br>
        <a href="/">← Back to Home</a>
    </div>
</body>
</html>
